[phases.setup]
nixPkgs = ["python311", "gcc", "libpq"]

[phases.install]
cmds = [
  "pip install fastapi uvicorn[standard] sqlalchemy[asyncio] asyncpg alembic pydantic pydantic-settings celery[redis] redis openai structlog httpx tenacity python-dotenv streamlit pandas plotly psycopg2-binary"
]

[phases.build]
cmds = [
  "alembic upgrade head"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
